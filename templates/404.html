<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — WorkPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans 3',sans-serif;background:#f0ebe0;color:#1a2e25;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:40px 24px;max-width:480px;}
.emblem{width:64px;height:64px;background:linear-gradient(135deg,#c9a84c,#e2c97e);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 24px;}
.code{font-family:'Playfair Display',serif;font-size:5rem;font-weight:700;color:#0d3d2e;line-height:1;margin-bottom:12px;}
.title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:#1a2e25;margin-bottom:10px;}
.desc{font-size:14px;color:#7a9488;line-height:1.7;margin-bottom:32px;}
.btn{display:inline-block;padding:12px 28px;background:#0d3d2e;color:#faf7f2;border-radius:8px;text-decoration:none;font-family:'Source Sans 3',sans-serif;font-weight:600;font-size:14px;transition:all 0.2s;}
.btn:hover{background:#155c44;transform:translateY(-1px);}
.footer{margin-top:32px;font-size:11px;color:#b0c4bc;}
</style>
</head>
<body>
<div class="wrap">
  <div class="emblem">🏛</div>
  <div class="code">404</div>
  <div class="title">Page Not Found</div>
  <div class="desc">The page you are looking for does not exist or has been moved. Please return to the WorkPulse dashboard.</div>
  <a href="/" class="btn">Return to Dashboard →</a>
  <div class="footer">WorkPulse · Company Secretariat · Confidential Internal System</div>
</div>
</body>
</html>
